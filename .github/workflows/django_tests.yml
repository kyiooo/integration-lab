name: Django Logic Tests
on: [push]
jobs:
  test-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Django
        run: pip install django
      - name: Run Tests
        run: python manage.py test